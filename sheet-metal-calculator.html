<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Sheet Metal Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .calculator-container {
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: flex;
            align-items: center;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #4a5568;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        select {
            background-color: #fdfdfd;
            font-weight: bold;
            color: #2c3e50;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }
        .results {
            margin-top: 25px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 4px;
            border-left: 5px solid #3498db;
        }
        .results p {
            margin: 8px 0;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
        }
        .per-lf-section {
            color: #555;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        .total-line {
            font-weight: bold;
            font-size: 1.3em !important;
            border-top: 2px solid #ccc;
            padding-top: 10px;
            color: #2c3e50;
        }
        /* CSS for the flashing Saved indicator */
        .save-indicator {
            color: #27ae60;
            font-size: 0.85em;
            margin-left: 10px;
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .save-indicator.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Sheet Metal Estimator</h2>
    
    <div class="input-group">
        <label for="profileSelect">Standard Profile</label>
        <select id="profileSelect">
            <option value="custom" data-stretch="20" data-labor="5.0">-- Custom Profile --</option>
            <option value="skirt_6" data-stretch="6" data-labor="1.5">6" Skirt / RTU Flashing</option>
            <option value="counter" data-stretch="8" data-labor="2.0">Counter Flashing</option>
            <option value="reglet" data-stretch="5" data-labor="1.5">Reglet Receiver</option>
            <option value="drip_8" data-stretch="8" data-labor="1.5">Drip Edge (up to 8")</option>
            <option value="drip_12" data-stretch="12" data-labor="1.5">Drip Edge (8-12")</option>
            <option value="drip_16" data-stretch="16" data-labor="1.5">Drip Edge (12-16")</option>
            <option value="cleat" data-stretch="4" data-labor="1.0">Cleat</option>
            <option value="coping_12" data-stretch="12" data-labor="3.0">Coping Cap (6-12")</option>
            <option value="coping_16" data-stretch="16" data-labor="4.0">Coping Cap (12-16")</option>
            <option value="coping_24" data-stretch="24" data-labor="5.0">Coping Cap (16-24")</option>
            <option value="coping_48" data-stretch="48" data-labor="5.0">Coping Cap (24-48")</option>
            <option value="tpo_drip" data-stretch="8" data-labor="1.5">TPO Coated Drip Edge</option>
            <option value="gravel_stop" data-stretch="12" data-labor="1.5">Gravel Stop / Fascia</option>
            <option value="surf_counter" data-stretch="6" data-labor="1.5">Surface Mounted Counterflashing</option>
            <option value="expansion" data-stretch="16" data-labor="2.0">Expansion Joint Cover</option>
            <option value="valley" data-stretch="24" data-labor="2.0">Valley Flashing</option>
            <option value="ridge" data-stretch="12" data-labor="1.5">Ridge Cap</option>
            <option value="z_closure" data-stretch="6" data-labor="1.0">Z-Closure / Z-Furring</option>
        </select>
    </div>

    <div class="input-group">
        <label for="stretchOut">Stretch Out (Inches)</label>
        <input type="number" id="stretchOut" value="20" step="0.5">
    </div>

    <div class="input-group">
        <label for="laborMins">Labor Minutes (per LF)</label>
        <input type="number" id="laborMins" value="5.0" step="0.1">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label for="totalLF">Total Linear Feet for Job</label>
        <input type="number" id="totalLF" value="100" step="1">
    </div>

    <div class="input-group">
        <label for="materialCost">
            Material Cost ($ per Sq Ft) 
            <span id="saveMat" class="save-indicator">✓ Saved</span>
        </label>
        <input type="number" id="materialCost" value="1.50" step="0.01">
    </div>

    <div class="input-group">
        <label for="laborRate">
            Shop Hourly Labor Rate ($) 
            <span id="saveLab" class="save-indicator">✓ Saved</span>
        </label>
        <input type="number" id="laborRate" value="60.00" step="1.00">
    </div>

    <div class="input-group">
        <label for="wasteFactor">
            Waste/Scrap Factor (%) 
            <span id="saveWaste" class="save-indicator">✓ Saved</span>
        </label>
        <input type="number" id="wasteFactor" value="10" step="1">
    </div>

    <div class="results">
        <div class="per-lf-section">
            <p><span>Cost Per LF (Material):</span> <span id="outMatLF">$0.00</span></p>
            <p><span>Cost Per LF (Labor):</span> <span id="outLabLF">$0.00</span></p>
        </div>
        <p><span>Total Material Cost:</span> <span id="outTotalMat">$0.00</span></p>
        <p><span>Total Labor Cost:</span> <span id="outTotalLab">$0.00</span></p>
        <p class="total-line"><span>Grand Total:</span> <span id="outGrandTotal">$0.00</span></p>
    </div>
</div>

<script>
    // 1. Load saved settings when the page opens
    window.addEventListener('DOMContentLoaded', () => {
        const savedMaterial = localStorage.getItem('alphaMaterialCost');
        const savedLabor = localStorage.getItem('alphaLaborRate');
        const savedWaste = localStorage.getItem('alphaWasteFactor');

        if (savedMaterial) document.getElementById('materialCost').value = savedMaterial;
        if (savedLabor) document.getElementById('laborRate').value = savedLabor;
        if (savedWaste) document.getElementById('wasteFactor').value = savedWaste;

        updateUI(); // Run the initial calculation
    });

    // 2. Dropdown behavior
    document.getElementById('profileSelect').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        document.getElementById('stretchOut').value = selectedOption.getAttribute('data-stretch');
        document.getElementById('laborMins').value = selectedOption.getAttribute('data-labor');
        updateUI(); 
    });

    // 3. Main calculation and saving function
    function updateUI() {
        const stretch = parseFloat(document.getElementById('stretchOut').value) || 0;
        const laborMins = parseFloat(document.getElementById('laborMins').value) || 0;
        const totalLF = parseFloat(document.getElementById('totalLF').value) || 0;
        const materialCost = parseFloat(document.getElementById('materialCost').value) || 0;
        const laborRate = parseFloat(document.getElementById('laborRate').value) || 0;
        const waste = parseFloat(document.getElementById('wasteFactor').value) || 0;

        // Auto-save the rates to the browser
        localStorage.setItem('alphaMaterialCost', materialCost);
        localStorage.setItem('alphaLaborRate', laborRate);
        localStorage.setItem('alphaWasteFactor', waste);

        // Math
        const materialSqFtPerLF = stretch / 12;
        const baseMaterialCostPerLF = materialSqFtPerLF * materialCost;
        const wasteMultiplier = 1 + (waste / 100);
        const totalMaterialCostPerLF = baseMaterialCostPerLF * wasteMultiplier;
        
        const laborRatePerMinute = laborRate / 60;
        const laborCostPerLF = laborMins * laborRatePerMinute;

        const grandTotalMaterial = totalMaterialCostPerLF * totalLF;
        const grandTotalLabor = laborCostPerLF * totalLF;
        const grandTotalJob = grandTotalMaterial + grandTotalLabor;

        // Update the screen
        document.getElementById('outMatLF').innerText = '$' + totalMaterialCostPerLF.toFixed(2);
        document.getElementById('outLabLF').innerText = '$' + laborCostPerLF.toFixed(2);
        document.getElementById('outTotalMat').innerText = '$' + grandTotalMaterial.toFixed(2);
        document.getElementById('outTotalLab').innerText = '$' + grandTotalLabor.toFixed(2);
        document.getElementById('outGrandTotal').innerText = '$' + grandTotalJob.toFixed(2);
    }

    // 4. Function to flash the "Saved!" text
    function triggerSaveFlash(elementId) {
        const indicator = document.getElementById(elementId);
        indicator.classList.add('show');
        
        // Remove the class after 1.5 seconds so it fades out
        setTimeout(() => {
            indicator.classList.remove('show');
        }, 1500);
    }

    // 5. Attach event listeners
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('input', updateUI);
    });

    // Attach specific listeners for the flash effect when rates change
    document.getElementById('materialCost').addEventListener('input', () => triggerSaveFlash('saveMat'));
    document.getElementById('laborRate').addEventListener('input', () => triggerSaveFlash('saveLab'));
    document.getElementById('wasteFactor').addEventListener('input', () => triggerSaveFlash('saveWaste'));

</script>

</body>
</html>
