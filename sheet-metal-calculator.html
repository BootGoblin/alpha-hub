<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Sheet Metal Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .calculator-container {
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .header-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: flex;
            align-items: center;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #4a5568;
        }
        input[type="number"], input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
            font-family: inherit;
        }
        select {
            background-color: #fdfdfd;
            font-weight: bold;
            color: #2c3e50;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }
        .results {
            margin-top: 25px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 4px;
            border-left: 5px solid #3498db;
        }
        .results p {
            margin: 8px 0;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
        }
        .per-lf-section {
            color: #555;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        .total-line {
            font-weight: bold;
            font-size: 1.2em !important;
            border-top: 2px solid #ccc;
            padding-top: 10px;
            color: #2c3e50;
        }
        .selling-line {
            font-weight: bold;
            font-size: 1.2em !important;
            color: #2c3e50;
            margin-top: 10px !important;
        }
        .final-line {
            font-weight: bold;
            font-size: 1.4em !important;
            color: #27ae60;
            margin-top: 10px !important;
            border-top: 2px solid #27ae60;
            padding-top: 10px;
        }
        .save-indicator {
            color: #27ae60;
            font-size: 0.85em;
            margin-left: 10px;
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .save-indicator.show {
            opacity: 1;
        }
        .highlight-input {
            border: 2px solid #3498db !important;
            background-color: #f0f8ff !important;
        }
        
        /* Print Options Styling */
        .print-options {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 4px;
            margin-top: 25px;
        }
        .print-options p {
            margin-top: 0;
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.95em;
            margin-bottom: 12px;
        }
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .checkbox-grid label {
            font-weight: normal;
            font-size: 0.85em;
            cursor: pointer;
            color: #555;
        }
        .checkbox-grid input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .print-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        .print-btn:hover {
            background-color: #2980b9;
        }
        
        /* --- PRINT STYLES --- */
        @media print {
            body { background-color: white; padding: 0; }
            .calculator-container { box-shadow: none; margin: 0; padding: 0; max-width: 100%; }
            .print-btn, .save-indicator, .print-options { display: none !important; }
            
            input[type="number"], input[type="text"], input[type="date"], select {
                border: none;
                background: transparent;
                padding: 0;
                font-weight: bold;
                color: #2c3e50;
                appearance: none;
                -webkit-appearance: none;
            }
            .highlight-input { border: none !important; background-color: transparent !important; }
            .results { border-left: 5px solid #bdc3c7; background: transparent; }

            /* Dynamic Hide Rules */
            body.hide-mat-print #groupMaterial { display: none !important; }
            body.hide-lab-print #groupLabor { display: none !important; }
            body.hide-waste-print #groupWaste { display: none !important; }
            body.hide-markup-print #groupMarkup { display: none !important; }
            body.hide-tax-print #groupTax { display: none !important; }
            body.hide-tax-print #resultTaxLine { display: none !important; }
            body.hide-internal-print .internal-result { display: none !important; }
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Alpha Sheet Metal Estimator</h2>
    
    <div class="header-row">
        <div class="input-group" style="flex: 2;">
            <label for="projectName">Project Name / Reference</label>
            <input type="text" id="projectName" placeholder="Enter job name...">
        </div>
        <div class="input-group">
            <label for="projectDate">Date</label>
            <input type="date" id="projectDate">
        </div>
    </div>

    <div class="divider"></div>
    
    <div class="input-group">
        <label for="profileSelect">Standard Profile</label>
        <select id="profileSelect">
            <option value="custom" data-stretch="20">-- Custom Profile --</option>
            <option value="skirt_6" data-stretch="6">6" Skirt / RTU Flashing</option>
            <option value="counter" data-stretch="8">Counter Flashing</option>
            <option value="reglet" data-stretch="5">Reglet Receiver</option>
            <option value="drip_8" data-stretch="8">Drip Edge (up to 8")</option>
            <option value="drip_12" data-stretch="12">Drip Edge (8-12")</option>
            <option value="drip_16" data-stretch="16">Drip Edge (12-16")</option>
            <option value="cleat" data-stretch="4">Cleat</option>
            <option value="coping_12" data-stretch="12">Coping Cap (6-12")</option>
            <option value="coping_16" data-stretch="16">Coping Cap (12-16")</option>
            <option value="coping_24" data-stretch="24">Coping Cap (16-24")</option>
            <option value="coping_48" data-stretch="48">Coping Cap (24-48")</option>
            <option value="tpo_drip" data-stretch="8">TPO Coated Drip Edge</option>
            <option value="gravel_stop" data-stretch="12">Gravel Stop / Fascia</option>
            <option value="surf_counter" data-stretch="6">Surface Mounted Counterflashing</option>
            <option value="expansion" data-stretch="16">Expansion Joint Cover</option>
            <option value="valley" data-stretch="24">Valley Flashing</option>
            <option value="ridge" data-stretch="12">Ridge Cap</option>
            <option value="z_closure" data-stretch="6">Z-Closure / Z-Furring</option>
        </select>
    </div>

    <div class="header-row">
        <div class="input-group">
            <label for="stretchOut">Stretch Out (Inches)</label>
            <input type="number" id="stretchOut" value="20" step="0.5">
        </div>
        <div class="input-group">
            <label for="totalLF">Total Linear Feet</label>
            <input type="number" id="totalLF" value="100" step="1">
        </div>
    </div>

    <div class="input-group">
        <label for="totalLaborMins">
            Total Labor Mins (Entire Order) <span id="saveLaborMins" class="save-indicator">✓ Saved</span>
        </label>
        <input type="number" id="totalLaborMins" value="60" step="1">
    </div>

    <div class="divider"></div>

    <div class="header-row" id="groupMaterial">
        <div class="input-group">
            <label for="materialCost">
                Mat. Cost ($/SqFt) <span id="saveMat" class="save-indicator">✓ Saved</span>
            </label>
            <input type="number" id="materialCost" value="1.50" step="0.01">
        </div>
        <div class="input-group">
            <label for="manualMaterialCost">
                Manual Material Total ($) <span id="saveManualMat" class="save-indicator">✓ Saved</span>
            </label>
            <input type="number" id="manualMaterialCost" class="highlight-input" placeholder="Overrides SqFt calc..." step="0.01">
        </div>
    </div>

    <div class="header-row">
        <div class="input-group" id="groupLabor">
            <label for="laborRate">
                Labor Rate ($/Hr) <span id="saveLab" class="save-indicator">✓ Saved</span>
            </label>
            <input type="number" id="laborRate" value="60.00" step="1.00">
        </div>
        <div class="input-group" id="groupWaste">
            <label for="wasteFactor">
                Waste Factor (%) <span id="saveWaste" class="save-indicator">✓ Saved</span>
            </label>
            <input type="number" id="wasteFactor" value="10" step="1">
        </div>
    </div>

    <div class="header-row">
        <div class="input-group" id="groupMarkup">
            <label for="markupFactor">
                Markup Factor (%) <span id="saveMarkup" class="save-indicator">✓ Saved</span>
            </label>
            <input type="number" id="markupFactor" value="20" step="1">
        </div>
        <div class="input-group" id="groupTax">
            <label for="taxRate">
                Tax Rate (%) <span id="saveTax" class="save-indicator">✓ Saved</span>
            </label>
            <input type="number" id="taxRate" value="9.3" step="0.1">
        </div>
    </div>

    <div class="results">
        <div class="per-lf-section internal-result">
            <p><span>Cost Per LF (Material):</span> <span id="outMatLF">$0.00</span></p>
            <p><span>Cost Per LF (Labor):</span> <span id="outLabLF">$0.00</span></p>
        </div>
        <p class="internal-result"><span>Total Material Cost:</span> <span id="outTotalMat">$0.00</span></p>
        <p class="internal-result"><span>Total Labor Cost:</span> <span id="outTotalLab">$0.00</span></p>
        <p class="total-line internal-result"><span>Total Base Cost:</span> <span id="outGrandTotal">$0.00</span></p>
        
        <p class="selling-line"><span>Subtotal:</span> <span id="outSellingPrice">$0.00</span></p>
        <p id="resultTaxLine"><span>Estimated Tax:</span> <span id="outTaxAmount">$0.00</span></p>
        <p class="final-line"><span>Estimated Cost:</span> <span id="outFinalPrice">$0.00</span></p>
    </div>

    <div class="print-options">
        <p>PDF Export Options (Hide fields on printout)</p>
        <div class="checkbox-grid">
            <label><input type="checkbox" id="chkHideMat"> Hide Material Cost & Overrides</label>
            <label><input type="checkbox" id="chkHideLab"> Hide Labor Rate</label>
            <label><input type="checkbox" id="chkHideWaste"> Hide Waste Factor</label>
            <label><input type="checkbox" id="chkHideMarkup"> Hide Markup Factor</label>
            <label><input type="checkbox" id="chkHideTax"> Hide Tax Rate</label>
            <label><input type="checkbox" id="chkHideInternal"> Hide Internal Base Totals</label>
        </div>
    </div>

    <button class="print-btn" onclick="window.print()">Print Estimate to PDF</button>

</div>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('projectDate').value = today;

    window.addEventListener('DOMContentLoaded', () => {
        const savedMaterial = localStorage.getItem('alphaMaterialCost');
        const savedManualMat = localStorage.getItem('alphaManualMaterialCost');
        const savedLabor = localStorage.getItem('alphaLaborRate');
        const savedTotalLabor = localStorage.getItem('alphaTotalLaborMins');
        const savedWaste = localStorage.getItem('alphaWasteFactor');
        const savedMarkup = localStorage.getItem('alphaMarkupFactor');
        const savedTax = localStorage.getItem('alphaTaxRate');

        if (savedMaterial !== null) document.getElementById('materialCost').value = savedMaterial;
        if (savedManualMat !== null) document.getElementById('manualMaterialCost').value = savedManualMat;
        if (savedLabor !== null) document.getElementById('laborRate').value = savedLabor;
        if (savedTotalLabor !== null) document.getElementById('totalLaborMins').value = savedTotalLabor;
        if (savedWaste !== null) document.getElementById('wasteFactor').value = savedWaste;
        if (savedMarkup !== null) document.getElementById('markupFactor').value = savedMarkup;
        if (savedTax !== null) document.getElementById('taxRate').value = savedTax;

        ['Mat', 'Lab', 'Waste', 'Markup', 'Tax', 'Internal'].forEach(id => {
            const savedState = localStorage.getItem('alphaHide' + id);
            if (savedState !== null) {
                document.getElementById('chkHide' + id).checked = (savedState === 'true');
            }
        });

        updatePrintClasses();
        updateUI(); 
    });

    document.getElementById('profileSelect').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        document.getElementById('stretchOut').value = selectedOption.getAttribute('data-stretch');
        updateUI(); 
    });

    function updateUI() {
        const stretch = parseFloat(document.getElementById('stretchOut').value) || 0;
        const totalLF = parseFloat(document.getElementById('totalLF').value) || 0;
        const totalLaborMins = parseFloat(document.getElementById('totalLaborMins').value) || 0;
        
        const materialCost = parseFloat(document.getElementById('materialCost').value) || 0;
        const manualMatCost = document.getElementById('manualMaterialCost').value;
        const laborRate = parseFloat(document.getElementById('laborRate').value) || 0;
        const waste = parseFloat(document.getElementById('wasteFactor').value) || 0;
        const markup = parseFloat(document.getElementById('markupFactor').value) || 0;
        const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;

        // Auto-save the rates
        localStorage.setItem('alphaMaterialCost', document.getElementById('materialCost').value);
        localStorage.setItem('alphaManualMaterialCost', manualMatCost);
        localStorage.setItem('alphaLaborRate', document.getElementById('laborRate').value);
        localStorage.setItem('alphaTotalLaborMins', document.getElementById('totalLaborMins').value);
        localStorage.setItem('alphaWasteFactor', document.getElementById('wasteFactor').value);
        localStorage.setItem('alphaMarkupFactor', document.getElementById('markupFactor').value);
        localStorage.setItem('alphaTaxRate', document.getElementById('taxRate').value);

        // --- Material Math ---
        let grandTotalMaterial = 0;
        let materialCostPerLF = 0;

        if (manualMatCost !== "" && parseFloat(manualMatCost) >= 0) {
            grandTotalMaterial = parseFloat(manualMatCost);
            materialCostPerLF = totalLF > 0 ? grandTotalMaterial / totalLF : 0;
        } else {
            const materialSqFtPerLF = stretch / 12;
            const baseMaterialCostPerLF = materialSqFtPerLF * materialCost;
            const wasteMultiplier = 1 + (waste / 100);
            materialCostPerLF = baseMaterialCostPerLF * wasteMultiplier;
            grandTotalMaterial = materialCostPerLF * totalLF;
        }
        
        // --- Labor Math ---
        const laborRatePerMinute = laborRate / 60;
        const grandTotalLabor = totalLaborMins * laborRatePerMinute;
        const laborCostPerLF = totalLF > 0 ? grandTotalLabor / totalLF : 0;

        // --- Totals Math ---
        const grandTotalJob = grandTotalMaterial + grandTotalLabor;
        const markupMultiplier = 1 + (markup / 100);
        const sellingPrice = grandTotalJob * markupMultiplier;
        const taxAmount = sellingPrice * (taxRate / 100);
        const finalPrice = sellingPrice + taxAmount;

        // --- Update UI ---
        document.getElementById('outMatLF').innerText = '$' + materialCostPerLF.toFixed(2);
        document.getElementById('outLabLF').innerText = '$' + laborCostPerLF.toFixed(2);
        document.getElementById('outTotalMat').innerText = '$' + grandTotalMaterial.toFixed(2);
        document.getElementById('outTotalLab').innerText = '$' + grandTotalLabor.toFixed(2);
        document.getElementById('outGrandTotal').innerText = '$' + grandTotalJob.toFixed(2);
        document.getElementById('outSellingPrice').innerText = '$' + sellingPrice.toFixed(2);
        document.getElementById('outTaxAmount').innerText = '$' + taxAmount.toFixed(2);
        document.getElementById('outFinalPrice').innerText = '$' + finalPrice.toFixed(2);
    }

    function updatePrintClasses() {
        ['Mat', 'Lab', 'Waste', 'Markup', 'Tax', 'Internal'].forEach(id => {
            const isChecked = document.getElementById('chkHide' + id).checked;
            document.body.classList.toggle('hide-' + id.toLowerCase() + '-print', isChecked);
            localStorage.setItem('alphaHide' + id, isChecked);
        });
    }

    function triggerSaveFlash(elementId) {
        const indicator = document.getElementById(elementId);
        if(indicator) {
            indicator.classList.add('show');
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 1500);
        }
    }

    const numberInputs = document.querySelectorAll('input[type="number"], input[type="text"], input[type="date"]');
    numberInputs.forEach(input => {
        input.addEventListener('input', updateUI);
    });

    const checkboxes = document.querySelectorAll('.checkbox-grid input[type="checkbox"]');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', updatePrintClasses);
    });

    document.getElementById('materialCost').addEventListener('input', () => triggerSaveFlash('saveMat'));
    document.getElementById('manualMaterialCost').addEventListener('input', () => triggerSaveFlash('saveManualMat'));
    document.getElementById('laborRate').addEventListener('input', () => triggerSaveFlash('saveLab'));
    document.getElementById('totalLaborMins').addEventListener('input', () => triggerSaveFlash('saveLaborMins'));
    document.getElementById('wasteFactor').addEventListener('input', () => triggerSaveFlash('saveWaste'));
    document.getElementById('markupFactor').addEventListener('input', () => triggerSaveFlash('saveMarkup'));
    document.getElementById('taxRate').addEventListener('input', () => triggerSaveFlash('saveTax'));

</script>

</body>
</html>
