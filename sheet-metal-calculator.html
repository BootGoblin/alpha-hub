<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Sheet Metal Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .calculator-container {
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .header-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: flex;
            align-items: center;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #4a5568;
        }
        input[type="number"], input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
            font-family: inherit;
        }
        select {
            background-color: #fdfdfd;
            font-weight: bold;
            color: #2c3e50;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }
        .results {
            margin-top: 25px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 4px;
            border-left: 5px solid #3498db;
        }
        .results p {
            margin: 8px 0;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
        }
        .per-lf-section {
            color: #555;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        .total-line {
            font-weight: bold;
            font-size: 1.2em !important;
            border-top: 2px solid #ccc;
            padding-top: 10px;
            color: #2c3e50;
        }
        .selling-line {
            font-weight: bold;
            font-size: 1.2em !important;
            color: #2c3e50;
            margin-top: 10px !important;
        }
        .final-line {
            font-weight: bold;
            font-size: 1.4em !important;
            color: #27ae60;
            margin-top: 10px !important;
            border-top: 2px solid #27ae60;
            padding-top: 10px;
        }
        .save-indicator {
            color: #27ae60;
            font-size: 0.85em;
            margin-left: 10px;
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .save-indicator.show {
            opacity: 1;
        }
        
        /* Print Options Styling */
        .print-options {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 4px;
            margin-top: 25px;
        }
        .print-options p {
            margin-top: 0;
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.95em;
            margin-bottom: 12px;
        }
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .checkbox-grid label {
            font-weight: normal;
            font-size: 0.85em;
            cursor: pointer;
            color: #555;
        }
