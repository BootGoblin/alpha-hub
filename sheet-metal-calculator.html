<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Sheet Metal Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .calculator-container {
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .header-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: flex;
            align-items: center;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #4a5568;
        }
        input[type="number"], input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
            font-family: inherit;
        }
        select {
            background-color: #fdfdfd;
            font-weight: bold;
            color: #2c3e50;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }
        .results {
            margin-top: 25px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 4px;
            border-left: 5px solid #3498db;
        }
        .results p {
            margin: 8px 0;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
        }
        .per-lf-section {
            color: #555;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        .total-line {
            font-weight: bold;
            font-size: 1.2em !important;
            border-top: 2px solid #ccc;
            padding-top: 10px;
            color: #2c3e50;
        }
        .selling-line {
            font-weight: bold;
            font-size: 1.2em !important;
            color: #2c3e50;
            margin-top: 10px !important;
        }
        .final-line {
            font-weight: bold;
            font-size: 1.4em !important;
            color: #27ae60;
            margin-top: 10px !important;
            border-top: 2px solid #27ae60;
            padding-top: 10px;
        }
        .save-indicator {
            color: #27ae60;
            font-size: 0.85em;
            margin-left: 10px;
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .save-indicator.show {
            opacity: 1;
        }
        .highlight-input {
            border: 2px solid #3498db !important;
            background-color: #f0f8ff !important;
        }
        
        /* Print Options Styling */
        .print-options {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 4px;
            margin-top: 25px;
        }
        .print-options p {
            margin-top: 0;
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.95em;
            margin-bottom: 12px;
        }
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .checkbox-grid label {
            font-weight: normal;
            font-size: 0.85em;
            cursor: pointer;
            color: #555;
        }
        .checkbox-grid input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .print-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        .print-btn:hover {
            background-color: #2980b9;
        }
        
        /* --- PRINT STYLES --- */
        @media print {
            body { background-color: white; padding: 0; }
            .calculator-container { box-shadow: none; margin: 0; padding: 0; max-width: 100%; }
            .print-btn, .save-indicator, .print-options { display: none !important; }
            
            input[type="number"], input[type="text"], input[type="date"], select {
                border: none;
                background: transparent;
                padding: 0;
                font-weight: bold;
                color: #2c3e50;
                appearance: none;
                -webkit-appearance: none;
            }
            .highlight-input { border: none !important; background-color: transparent !important; }
            .results { border-left: 5px solid #bdc3c7; background: transparent; }

            /* Dynamic Hide Rules */
            body.hide-mat-print #groupMaterial { display: none !important; }
            body.hide-lab-print #groupLabor { display: none !important; }
            body.hide-waste-print #groupWaste { display: none !important; }
            body.hide-markup-print #groupMarkup { display: none !important; }
            body.hide-tax-print #groupTax { display: none !important; }
            body.hide-tax-print #resultTaxLine { display: none !important; }
            body.hide-internal-print .internal-result { display: none !important; }
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Alpha Sheet Metal Estimator</h2>
    
    <div class="header-row">
        <div class="input-group" style="flex: 2;">
            <label for="projectName">Project Name / Reference</label>
            <input type="text" id="projectName" placeholder="Enter job name...">
        </div>
        <div class="input-group">
            <label for="projectDate">Date</label>
            <input type="date" id="projectDate">
        </div>
    </div>

    <div class="divider"></div>
    
    <div class="input-group">
        <label for="profileSelect">Standard Profile</label>
        <select id="profileSelect
